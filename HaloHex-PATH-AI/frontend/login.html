<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8" />
<meta name="viewport" content="width=device-width, initial-scale=1.0" />
<title>Log in · HaloHex PATH AI</title>
<link rel="preconnect" href="https://fonts.googleapis.com">
<link href="https://fonts.googleapis.com/css2?family=Sora:wght@400;600;700;800&family=Inter:wght@400;500;600&display=swap" rel="stylesheet">
<link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.5.1/css/all.min.css">
<link rel="stylesheet" href="style.css" />
</head>
<body>

<div class="hex-bg" aria-hidden="true"></div>

<div class="auth-page">
  <div class="glass-card auth-card">
    <div class="auth-brand">
      <span class="hex-mark"><i class="fa-solid fa-hexagon-nodes"></i></span>
      HaloHex <span class="brand-accent">PATH AI</span>
    </div>

    <h2>Welcome back</h2>
    <p class="auth-sub">Log in to continue your learning path.</p>

    <div class="form-error" id="formError"></div>

    <form id="loginForm">
      <div class="field">
        <label for="email">Email</label>
        <input type="email" id="email" placeholder="you@example.com" required />
      </div>

      <div class="field">
        <label for="password">Password</label>
        <input type="password" id="password" placeholder="••••••••" required minlength="6" />
      </div>

      <button type="submit" class="btn-primary btn-block">
        <i class="fa-solid fa-right-to-bracket"></i> Log in
      </button>
    </form>

    <p class="auth-switch">
      Don't have an account? <a href="register.html">Create one</a>
    </p>
  </div>
</div>

<script>
  // ---------------------------------------------------------------
  // PLACEHOLDER LOGIN LOGIC — there is no auth backend yet.
  // Replace this block with a real call once you add an endpoint,
  // e.g.:
  //
  //   const res = await fetch(`${BACKEND_URL}/login`, {
  //     method: "POST",
  //     headers: { "Content-Type": "application/json" },
  //     body: JSON.stringify({ email, password })
  //   });
  //
  // On success the backend should set a session (HttpOnly cookie
  // or return a token you attach to future requests), then redirect
  // to dashboard.html.
  // ---------------------------------------------------------------

  const params = new URLSearchParams(window.location.search);
  if (params.get("registered") === "true") {
    const note = document.getElementById("formError");
    note.textContent = "Account created — please log in.";
    note.style.background = "rgba(34,211,238,0.12)";
    note.style.borderColor = "rgba(34,211,238,0.35)";
    note.style.color = "#7dd3fc";
    note.classList.add("visible");
  }

  document.getElementById("loginForm").addEventListener("submit", (e) => {
    e.preventDefault();
    const email = document.getElementById("email").value.trim();
    const password = document.getElementById("password").value;
    const errorBox = document.getElementById("formError");

    if (!email || !password) {
      errorBox.textContent = "Please fill in both fields.";
      errorBox.classList.add("visible");
      return;
    }

    // Demo-only: no real authentication is performed yet.
    window.location.href = "dashboard.html";
  });
</script>
</body>
</html>

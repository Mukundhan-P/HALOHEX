<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8" />
<meta name="viewport" content="width=device-width, initial-scale=1.0" />
<title>Create account · HaloHex PATH AI</title>
<link rel="preconnect" href="https://fonts.googleapis.com">
<link href="https://fonts.googleapis.com/css2?family=Sora:wght@400;600;700;800&family=Inter:wght@400;500;600&display=swap" rel="stylesheet">
<link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.5.1/css/all.min.css">
<link rel="stylesheet" href="style.css" />
</head>
<body>

<div class="hex-bg" aria-hidden="true"></div>

<div class="auth-page">
  <div class="glass-card auth-card">
    <div class="auth-brand">
      <span class="hex-mark"><i class="fa-solid fa-hexagon-nodes"></i></span>
      HaloHex <span class="brand-accent">PATH AI</span>
    </div>

    <h2>Create your account</h2>
    <p class="auth-sub">Start mapping your personalized learning path.</p>

    <div class="form-error" id="formError"></div>

    <form id="registerForm">
      <div class="field">
        <label for="fullName">Full name</label>
        <input type="text" id="fullName" placeholder="e.g. Ananya Sharma" required />
      </div>

      <div class="field">
        <label for="email">Email</label>
        <input type="email" id="email" placeholder="you@example.com" required />
      </div>

      <div class="field-row">
        <div class="field">
          <label for="password">Password</label>
          <input type="password" id="password" placeholder="••••••••" required minlength="6" />
        </div>
        <div class="field">
          <label for="confirmPassword">Confirm password</label>
          <input type="password" id="confirmPassword" placeholder="••••••••" required minlength="6" />
        </div>
      </div>

      <button type="submit" class="btn-primary btn-block">
        <i class="fa-solid fa-user-plus"></i> Create account
      </button>
    </form>

    <p class="auth-switch">
      Already have an account? <a href="login.html">Log in</a>
    </p>
  </div>
</div>

<script>
  // ---------------------------------------------------------------
  // PLACEHOLDER REGISTER LOGIC — there is no auth backend yet.
  // Replace this block once you add a real endpoint, e.g.:
  //
  //   const res = await fetch(`${BACKEND_URL}/register`, {
  //     method: "POST",
  //     headers: { "Content-Type": "application/json" },
  //     body: JSON.stringify({ fullName, email, password })
  //   });
  //
  // Note: don't reuse the existing "users" table in models.py for
  // accounts — that table stores generated roadmaps. Add a
  // separate "accounts" table for login credentials.
  // ---------------------------------------------------------------

  document.getElementById("registerForm").addEventListener("submit", (e) => {
    e.preventDefault();
    const fullName = document.getElementById("fullName").value.trim();
    const email = document.getElementById("email").value.trim();
    const password = document.getElementById("password").value;
    const confirmPassword = document.getElementById("confirmPassword").value;
    const errorBox = document.getElementById("formError");

    errorBox.classList.remove("visible");

    if (!fullName || !email || !password || !confirmPassword) {
      errorBox.textContent = "Please fill in every field.";
      errorBox.classList.add("visible");
      return;
    }

    if (password !== confirmPassword) {
      errorBox.textContent = "Passwords don't match.";
      errorBox.classList.add("visible");
      return;
    }

    if (password.length < 6) {
      errorBox.textContent = "Password must be at least 6 characters.";
      errorBox.classList.add("visible");
      return;
    }

    // Demo-only: no account is actually created yet.
    window.location.href = "login.html?registered=true";
  });
</script>
</body>
</html>
